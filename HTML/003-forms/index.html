<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form</title>
</head>
<body>
    <form method="post" action="" title="Teste">
        <fieldset>
            <legend>Login</legend>
            <label>Nome:
                <input type="text" name="name" id="name" placeholder="Digite seu nome..." required>
            </label>
            <br>
            <label>Email:
                <input type="email" email="email" id="email" placeholder="Digite seu nome..." required>
            </label>
            <br>
            <label for="senha">Senha:</label>
            <input type="password" name="senha" id="senha" placeholder="Digite seu nome..." size="8" required>
        </fieldset>
        <br>
        <button type="submit">Enviar</button>
        <button type="reset">Resetar</button>
    </form>
</body>
</html>
