<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main>
        <section>
            <h2>Formulário de Cadastro</h2>
            <ul>
                <li>Nenhum campo pode estar vazio</li>
                <li>Usuário só pode conter letras ou números</li>
                <li>Usuário só poderá ter entre 3 e 12 caracteres</li>
                <li>Senha precisa ter entre 6 e 12 caracteres</li>
            </ul>

            <form action="/" method="post">
                <label for="nome">Nome</label>
                <input type="text" id="nome">
                <label for="sobrenome">Sobrenome</label>
                <input type="text" id="sobrenome">
                <label for="cpf">CPF</label>
                <input type="text" id="cpf">
                <label for="usuario">Usuário</label>
                <input type="text" id="usuario">
                <label for="senha">Senha</label>
                <input type="password" id="senha">
                <label for="repetir-senha">Repetir senha</label>
                <input type="password" id="repetir-senha">
                <button type="submit">Enviar</button>
            </form>
        </section>
    </main>

    <script type="" src="./script.js"></script>
</body>
</html>
